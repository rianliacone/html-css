<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de frame</title>
</head>
<style>
    iframe {
        width: 400px;
        height: 400px;
        border: 1px dashed black;
    }
</style>
<body>
    <h1>
        Testando o uso de iframe
    </h1>
    <p>
        Acessando o site do 
        <iframe src="https://www.cursoemvideo.com" frameborder="1" height="500px" width="500px" scolling="no">
            <a href="https://cursoemvideo.com" target="_blank">Curso em Vídeo</a>
        </iframe>

        para aprender a programar
    </p>
    <p>
        O repositório do Guanabara 

        <iframe src="https://gustavoguanabara.github.io" frameborder="0" height="500px" width="500px"></iframe>

        também é legal!
    </p>
</body>
</html>
